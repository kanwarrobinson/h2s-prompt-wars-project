name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, task-service, messaging-service, notification-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/services/${{ matrix.service }}/requirements.txt

      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=. pytest services/${{ matrix.service }}/tests/ -v --tb=short --cov=services/${{ matrix.service }} --cov-report=xml
        env:
          ENVIRONMENT: development
          MONGODB_URI: mongodb://localhost:27017/devcollab_test
          REDIS_HOST: localhost
          GCP_PROJECT_ID: devcollab-test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: ${{ matrix.service }}
        continue-on-error: true

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run tests
        run: npm run test --prefix frontend

      - name: Build
        run: npm run build --prefix frontend
        env:
          VITE_API_URL: https://api.devcollab.example.com
          VITE_WS_URL: wss://ws.devcollab.example.com
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: backend
            dockerfile: backend/services/api-gateway/Dockerfile
          - service: task-service
            context: backend
            dockerfile: backend/services/task-service/Dockerfile
          - service: messaging-service
            context: backend
            dockerfile: backend/services/messaging-service/Dockerfile
          - service: notification-worker
            context: backend
            dockerfile: backend/services/notification-worker/Dockerfile
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: devcollab/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [docker-build]
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, task-service, messaging-service, notification-worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'frontend' && 'frontend' || 'backend' }}
          file: ${{ matrix.service == 'frontend' && 'frontend/Dockerfile' || format('backend/services/{0}/Dockerfile', matrix.service) }}
          push: false
          load: true
          tags: devcollab/${{ matrix.service }}:scan

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devcollab/${{ matrix.service }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
